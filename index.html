<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Accountability"/>
<meta name="theme-color" content="#07070d"/>
<title>Accountability</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:#07070d;font-family:Georgia,serif;color:#f0f0f5;min-height:100vh;}
input,button{font-family:Georgia,serif;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input{-webkit-appearance:none;appearance:none;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:80px;}
.header{background:linear-gradient(135deg,#111118,#0d0d1a);border-bottom:1px solid #252535;padding:max(env(safe-area-inset-top),16px) 20px 12px;position:sticky;top:0;z-index:100;}
.header-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#6b6b85;margin-bottom:4px;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.header-title{font-size:18px;font-weight:bold;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#6b6b85;display:inline-block;margin-left:8px;transition:background .3s;}
.sync-dot.synced{background:#00E676;}
.sync-dot.syncing{background:#FF9800;animation:pulse 1s infinite;}
.sync-dot.error{background:#FF5252;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.content{padding:16px 16px 0;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#111118;border-top:1px solid #252535;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav button{flex:1;padding:10px 4px;background:none;border:none;border-bottom:2px solid transparent;color:#6b6b85;font-size:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;}
.nav button.active{color:#f0f0f5;border-bottom-color:#FF6B35;}
.nav button .icon{font-size:18px;display:block;margin-bottom:2px;}
.card{background:#16161f;border:1px solid #252535;border-radius:16px;padding:16px;margin-bottom:12px;}
.label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6b6b85;margin-bottom:14px;}
input.field{background:#111118;border:1px solid #252535;border-radius:10px;color:#f0f0f5;padding:10px 14px;font-size:14px;width:100%;outline:none;}
.btn{border:none;border-radius:12px;padding:12px 24px;font-size:14px;cursor:pointer;font-weight:bold;background:#FF6B35;color:#fff;}
.btn-gold{background:#FFD700;color:#000;}
.btn-outline{background:transparent;color:#6b6b85;border:1px solid #252535;border-radius:12px;padding:12px 24px;font-size:14px;cursor:pointer;}
.btn-full{width:100%;}
.btn-sm{padding:8px 14px;font-size:12px;}
.pill{padding:6px 16px;border-radius:20px;border:1.5px solid #252535;background:transparent;color:#6b6b85;cursor:pointer;font-size:13px;}
.pill.active-me{border-color:#FF6B35;background:#FF6B3522;color:#FF6B35;font-weight:bold;}
.pill.active-partner{border-color:#E91E8C;background:#E91E8C22;color:#E91E8C;font-weight:bold;}
.habit-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.habit-btn{width:48px;height:48px;border-radius:14px;border:2px solid #252535;background:transparent;color:#6b6b85;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.habit-btn.done{border-color:#00E676;background:#00E67622;color:#00E676;}
.progress-bar{background:#111118;border-radius:8px;height:8px;overflow:hidden;margin-bottom:6px;}
.progress-fill{height:100%;border-radius:8px;transition:width .5s;}
.modal-overlay{position:fixed;inset:0;background:#000000bb;z-index:1000;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#16161f;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;border:1px solid #252535;border-bottom:none;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:bold;margin-bottom:20px;}
.modal-field{margin-bottom:12px;}
.modal-field label{display:block;font-size:12px;color:#6b6b85;margin-bottom:6px;}
.modal-row{display:flex;gap:10px;}
.row{display:flex;gap:8px;margin-bottom:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1;border-radius:8px;background:#111118;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;}
.cal-day.today{border-color:#FF6B35;}
.cal-day.future{background:transparent;color:#252535;}
.cal-day.both{background:#00E67633;}
.cal-day.one{background:#FF6B3522;}
.dots{display:flex;gap:2px;margin-top:2px;}
.dot{width:4px;height:4px;border-radius:50%;background:#252535;}
.months-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;}
.month-pill{background:transparent;border:1px solid #252535;color:#6b6b85;border-radius:10px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;}
.month-pill.active{background:#FF6B35;border-color:#FF6B35;color:#fff;}
.streak-chip{background:#111118;border-radius:8px;padding:4px 10px;font-size:12px;}
.split{display:flex;gap:10px;}
.split>div{flex:1;}
.stat-box{flex:1;background:#111118;border-radius:10px;padding:10px 8px;text-align:center;}
.stat-label{font-size:10px;color:#6b6b85;margin-bottom:4px;}
.stat-val{font-size:14px;font-weight:bold;}
.saved-row{margin-top:12px;padding:10px;background:#111118;border-radius:10px;font-size:13px;color:#6b6b85;}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#f0f0f5;flex-direction:column;gap:16px;}
.spinner{width:32px;height:32px;border:3px solid #252535;border-top-color:#FF6B35;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-sub">Accountability <span class="sync-dot" id="sync-dot"></span></div>
    <div class="header-row">
      <div class="header-title" id="hdr-title"></div>
      <div id="hdr-score" style="font-size:13px"></div>
    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spinner"></div><div>Connecting...</div></div></div>
  <nav class="nav" id="nav"></nav>
</div>
<div id="modals"></div>

<script>
// ── Firebase REST API (no SDK needed) ─────────────────────────────────────
const DB_URL = "https://accountability-1ef9d-default-rtdb.asia-southeast1.firebasedatabase.app/app";

// Poll every 5 seconds for updates from the other phone
let pollInterval = null;
let lastSaveTime = 0;

async function firebaseGet(){
  const res = await fetch(`${DB_URL}.json`);
  if(!res.ok) throw new Error("HTTP "+res.status);
  return await res.json();
}

async function firebaseSet(data){
  const res = await fetch(`${DB_URL}.json`, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
  if(!res.ok) throw new Error("HTTP "+res.status);
  return await res.json();
}

function startPolling(){
  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async ()=>{
    // Don't overwrite if we just saved within last 2 seconds
    if(Date.now() - lastSaveTime < 2000) return;
    try{
      const data = await firebaseGet();
      if(data){
        const merged = mergeData(data);
        // Only re-render if data actually changed
        if(JSON.stringify(merged) !== JSON.stringify(S)){
          S = merged;
          try{ localStorage.setItem("acc_fallback", JSON.stringify(S)); }catch{}
          render();
        }
      }
    } catch(e){ /* silent poll failure */ }
  }, 5000);
}

function mergeData(data){
  return {
    ...DEFAULT, ...data,
    users: {...DEFAULT.users, ...(data.users||{})},
    habits: data.habits || DEFAULT.habits,
    logs: data.logs || {},
    stepCounts: data.stepCounts || {},
    weights: data.weights || {},
    goals: {me:(data.goals&&data.goals.me)||DEFAULT.goals.me, partner:(data.goals&&data.goals.partner)||DEFAULT.goals.partner},
    prizes: data.prizes || {},
    settings: {...DEFAULT.settings, ...(data.settings||{})},
  };
}

// ── Default state ──────────────────────────────────────────────────────────
const DEFAULT = {
  users:{me:{name:"Tarek",color:"#FF6B35",emoji:"💪"},partner:{name:"Marissa",color:"#E91E8C",emoji:"✨"}},
  habits:[{id:"gym",name:"Gym",icon:"🏋️",target:30},{id:"steps",name:"10K Steps",icon:"👟",target:30,isSteps:true},{id:"calories",name:"Calories",icon:"🥗",target:30}],
  logs:{},stepCounts:{},weights:{},
  goals:{me:[{id:"g1",name:"Trip to Japan 🇯🇵",date:"2025-05-15"}],partner:[]},
  prizes:{},settings:{calorieTarget:2000,stepTarget:10000}
};

let S = null;
let tab = "today", activeUser = "me";
let curYear = new Date().getFullYear(), curMonth = new Date().getMonth();
let saveTimeout = null;
let isSaving = false;

// ── Sync status ────────────────────────────────────────────────────────────
function setSyncStatus(status){
  const dot = document.getElementById("sync-dot");
  if(!dot) return;
  dot.className = "sync-dot " + status;
}

// ── Save ──────────────────────────────────────────────────────────────────
function save(){
  setSyncStatus("syncing");
  lastSaveTime = Date.now();
  try{ localStorage.setItem("acc_fallback", JSON.stringify(S)); }catch{}
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async ()=>{
    try{
      await firebaseSet(S);
      setSyncStatus("synced");
    } catch(e){
      console.error("Save failed:",e);
      setSyncStatus("error");
    }
  }, 600);
}

// ── Firebase load + live listener ─────────────────────────────────────────
// ── Initial load ──────────────────────────────────────────────────────────
(async ()=>{
  // Try Firebase first, fall back to localStorage
  const fallbackTimer = setTimeout(()=>{
    if(!S){
      setSyncStatus("error");
      try{
        const raw = localStorage.getItem("acc_fallback");
        S = raw ? mergeData(JSON.parse(raw)) : JSON.parse(JSON.stringify(DEFAULT));
      } catch { S = JSON.parse(JSON.stringify(DEFAULT)); }
      render();
    }
  }, 6000);

  try{
    const data = await firebaseGet();
    clearTimeout(fallbackTimer);
    if(data){
      S = mergeData(data);
    } else {
      S = JSON.parse(JSON.stringify(DEFAULT));
      await firebaseSet(S);
    }
    try{ localStorage.setItem("acc_fallback", JSON.stringify(S)); }catch{}
    setSyncStatus("synced");
    render();
    startPolling();
  } catch(e){
    clearTimeout(fallbackTimer);
    console.error("Firebase load failed:", e);
    setSyncStatus("error");
    try{
      const raw = localStorage.getItem("acc_fallback");
      S = raw ? mergeData(JSON.parse(raw)) : JSON.parse(JSON.stringify(DEFAULT));
    } catch { S = JSON.parse(JSON.stringify(DEFAULT)); }
    render();
  }
})();

// ── Helpers ────────────────────────────────────────────────────────────────
const TABS = [{id:"today",label:"Today",icon:"☀️"},{id:"score",label:"Score",icon:"🏆"},{id:"calendar",label:"Calendar",icon:"📅"},{id:"goals",label:"Goals",icon:"🎯"},{id:"settings",label:"Settings",icon:"⚙️"}];
function today(){return new Date().toISOString().split("T")[0];}
function monthKey(y,m){return`${y}-${String(m+1).padStart(2,"0")}`;}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function daysBetween(d1,d2){return Math.ceil((new Date(d2)-new Date(d1))/86400000);}
function monthDays(y,m){const days=[],t=daysInMonth(y,m);for(let d=1;d<=t;d++)days.push(`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);return days;}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}

function getUserScore(user,y,m){
  // 1 point per day where completed habits >= total habits (or total-1 if >3 habits)
  let score=0;
  monthDays(y,m).forEach(day=>{
    const total=S.habits.length;
    const done=S.habits.filter(h=>S.logs&&S.logs[`${user}|${day}|${h.id}`]).length;
    const threshold=total<=3?total:total-1;
    if(done>=threshold&&total>0)score++;
  });
  return score;
}
function getMonthPct(user,y,m){
  const days=monthDays(y,m);
  if(!days.length||!S.habits.length)return 0;
  const total=S.habits.length,threshold=total<=3?total:total-1;
  const pointDays=days.filter(day=>{
    const done=S.habits.filter(h=>S.logs&&S.logs[`${user}|${day}|${h.id}`]).length;
    return done>=threshold;
  }).length;
  return(pointDays/days.length)*100;
}
function getStreak(user,id){
  let streak=0,d=new Date(today());
  while(S.logs&&S.logs[`${user}|${d.toISOString().split("T")[0]}|${id}`]){streak++;d.setDate(d.getDate()-1);}
  return streak;
}
function getWeightEntries(user){
  if(!S.weights)return[];
  return Object.entries(S.weights).filter(([k])=>k.startsWith(`${user}|`))
    .map(([k,v])=>({date:k.split("|")[1],weight:parseFloat(v.weight)}))
    .filter(e=>!isNaN(e.weight)).sort((a,b)=>a.date.localeCompare(b.date));
}
function getWeightStats(user){
  const e=getWeightEntries(user);if(e.length<2)return null;
  const first=e[0].weight,last=e[e.length-1].weight,tc=last-first;
  const ds=Math.max(daysBetween(e[0].date,e[e.length-1].date),1);
  return{totalChange:tc,weeklyAvg:(tc/ds)*7,first,last};
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  if(!S) return;
  renderHeader();
  renderNav();
  renderContent();
}
function renderHeader(){
  const u=S.users;
  document.getElementById("hdr-title").innerHTML=
    `<span style="color:${u.me.color}">${u.me.emoji} ${u.me.name}</span>`+
    `<span style="color:#6b6b85;font-size:14px"> vs </span>`+
    `<span style="color:${u.partner.color}">${u.partner.name} ${u.partner.emoji}</span>`;
  const ms=getUserScore("me",curYear,curMonth),ps=getUserScore("partner",curYear,curMonth);
  document.getElementById("hdr-score").innerHTML=
    `<span style="color:${u.me.color};font-weight:bold">${ms}</span>`+
    `<span style="color:#6b6b85"> – </span>`+
    `<span style="color:${u.partner.color};font-weight:bold">${ps}</span>`;
}
function renderNav(){
  const nav=document.getElementById("nav");nav.innerHTML="";
  TABS.forEach(t=>{
    const btn=el("button","");btn.innerHTML=`<span class="icon">${t.icon}</span>${t.label}`;
    if(t.id===tab)btn.classList.add("active");
    btn.onclick=()=>{tab=t.id;render();};
    nav.appendChild(btn);
  });
}
function renderContent(){
  const c=document.getElementById("content");c.innerHTML="";
  if(tab==="today")c.appendChild(renderToday());
  else if(tab==="score")c.appendChild(renderScore());
  else if(tab==="calendar")c.appendChild(renderCalendar());
  else if(tab==="goals")c.appendChild(renderGoals());
  else if(tab==="settings")c.appendChild(renderSettings());
}

// ── TODAY ──────────────────────────────────────────────────────────────────
function renderToday(){
  const wrap=el("div"),t=today(),u=S.users;
  const userGoals=(S.goals&&S.goals[activeUser])||[];const upcoming=userGoals.map(g=>({...g,days:daysBetween(t,g.date)})).filter(g=>g.days>=0).sort((a,b)=>a.days-b.days)[0];
  if(upcoming){
    const gc=el("div","card");
    gc.style.cssText="background:linear-gradient(135deg,#1a0a2e,#0d0a1e);border:1px solid #6B35FF44;text-align:center;margin-bottom:16px;";
    gc.innerHTML=`<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#9B6BFF;margin-bottom:6px">Next Goal</div>`+
      `<div style="font-size:20px;font-weight:bold;margin-bottom:4px">${upcoming.name}</div>`+
      `<div style="font-size:56px;font-weight:900;color:#9B6BFF;line-height:1;text-shadow:0 0 30px #6B35FF88">${upcoming.days}</div>`+
      `<div style="font-size:13px;color:#6b6b85;margin-top:4px">days to go · ${upcoming.date}</div>`;
    wrap.appendChild(gc);
  }

  // User pills
  const pills=el("div","row");
  ["me","partner"].forEach(usr=>{
    const btn=el("button","pill");btn.textContent=`${u[usr].emoji} ${u[usr].name}`;
    if(activeUser===usr)btn.classList.add(usr==="me"?"active-me":"active-partner");
    btn.onclick=()=>{activeUser=usr;render();};pills.appendChild(btn);
  });
  wrap.appendChild(pills);

  // Habits
  const hcard=el("div","card");hcard.appendChild(el("div","label","Today's Habits"));
  S.habits.forEach(habit=>{
    const done=!!(S.logs&&S.logs[`${activeUser}|${t}|${habit.id}`]);
    const streak=getStreak(activeUser,habit.id);
    const sc=habit.isSteps?((S.stepCounts&&S.stepCounts[`${activeUser}|${t}`])||0):0;
    const st=S.settings.stepTarget||10000;
    const row=el("div","habit-row");
    const hbtn=el("button","habit-btn"+(done?" done":""));hbtn.textContent=done?"✓":habit.icon;
    hbtn.onclick=()=>{
      if(habit.isSteps){showStepsModal(activeUser,t);}
      else{if(!S.logs)S.logs={};S.logs[`${activeUser}|${t}|${habit.id}`]=!S.logs[`${activeUser}|${t}|${habit.id}`];save();render();}
    };
    row.appendChild(hbtn);
    const info=el("div","");info.style.flex="1";
    const nm=el("div","");nm.style.cssText=`font-size:15px;color:${done?"#00E676":""};font-weight:${done?"bold":"normal"}`;nm.textContent=habit.name;info.appendChild(nm);
    if(habit.isSteps){const sd=el("div","");sd.style.cssText=`font-size:11px;color:${done?"#00E676":sc>0?"#FF9800":"#6b6b85"}`;sd.textContent=sc>0?`${sc.toLocaleString()} / ${st.toLocaleString()} steps`:"Tap to log steps";info.appendChild(sd);}
    if(streak>0){const sr=el("div","");sr.style.cssText="font-size:11px;color:#FF9800";sr.textContent=`🔥 ${streak} day streak`;info.appendChild(sr);}
    row.appendChild(info);
    if(habit.isSteps){const lb=el("button","");lb.style.cssText="background:none;border:1px solid #252535;border-radius:8px;color:#6b6b85;padding:5px 10px;font-size:11px;cursor:pointer;";lb.textContent="Log";lb.onclick=()=>showStepsModal(activeUser,t);row.appendChild(lb);}
    hcard.appendChild(row);
  });
  const addBtn=el("button","btn-outline btn-full");addBtn.style.fontSize="12px";addBtn.textContent="+ Add Habit";addBtn.onclick=()=>showHabitModal();
  hcard.appendChild(addBtn);wrap.appendChild(hcard);

  // Check-in
  const ci=(S.weights&&S.weights[`${activeUser}|${t}`])||{};
  const cicard=el("div","card");cicard.appendChild(el("div","label","Daily Check-in"));
  const splitDiv=el("div","split");splitDiv.style.marginBottom="12px";
  const wDiv=el("div","");wDiv.innerHTML=`<div style="font-size:11px;color:#6b6b85;margin-bottom:6px">Weight (kg)</div>`;
  const wInput=el("input","field");wInput.type="number";wInput.placeholder=ci.weight||"80.5";wInput.id="ci-weight";wDiv.appendChild(wInput);
  const calDiv=el("div","");calDiv.innerHTML=`<div style="font-size:11px;color:#6b6b85;margin-bottom:6px">Calories eaten</div>`;
  const calInput=el("input","field");calInput.type="number";calInput.placeholder=ci.calories||"1800";calInput.id="ci-cal";calDiv.appendChild(calInput);
  splitDiv.appendChild(wDiv);splitDiv.appendChild(calDiv);cicard.appendChild(splitDiv);
  const saveBtn=el("button","btn btn-full");saveBtn.style.background=S.users[activeUser].color;saveBtn.textContent="Save Check-in";
  saveBtn.onclick=()=>{
    const w=document.getElementById("ci-weight").value;
    const cal=document.getElementById("ci-cal").value;
    if(w||cal){if(!S.weights)S.weights={};S.weights[`${activeUser}|${t}`]={weight:w||ci.weight||"",calories:cal||ci.calories||""};save();render();}
  };
  cicard.appendChild(saveBtn);
  if(ci.weight){
    const ov=ci.calories&&S.settings.calorieTarget?Number(ci.calories)-S.settings.calorieTarget:null;
    const saved=el("div","saved-row");
    saved.innerHTML=`Saved: <span style="color:#f0f0f5">${ci.weight}kg</span> · <span style="color:#f0f0f5">${ci.calories||"–"} cal</span>`+(ov!==null?` <span style="color:${ov<=0?"#00E676":"#FF5252"}">${ov<=0?"✓ on target":"(+"+ov+" over)"}</span>`:"");
    cicard.appendChild(saved);
  }
  wrap.appendChild(cicard);
  return wrap;
}

// ── SCORE ──────────────────────────────────────────────────────────────────
function renderScore(){
  const wrap=el("div");
  const ms=getUserScore("me",curYear,curMonth),ps=getUserScore("partner",curYear,curMonth);
  const mPct=getMonthPct("me",curYear,curMonth),pPct=getMonthPct("partner",curYear,curMonth);
  const winner=ms===ps?null:ms>ps?"me":"partner";
  const prize=winner&&S.prizes?S.prizes[`${winner}|${monthKey(curYear,curMonth)}`]:null;
  const months=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push({y:d.getFullYear(),m:d.getMonth(),label:d.toLocaleString("default",{month:"short",year:"2-digit"})});}
  const mr=el("div","months-row");
  months.forEach(mo=>{const btn=el("button","month-pill");btn.textContent=mo.label;if(mo.y===curYear&&mo.m===curMonth)btn.classList.add("active");btn.onclick=()=>{curYear=mo.y;curMonth=mo.m;render();};mr.appendChild(btn);});
  wrap.appendChild(mr);

  const wc=el("div","card");
  if(winner){
    const wcolor=S.users[winner].color;
    wc.style.cssText=`background:linear-gradient(135deg,${wcolor}33,#111118);border:1px solid ${wcolor}44;border-radius:20px;padding:20px;margin-bottom:16px;text-align:center;`;

function renderWeightChart(entries,color){
  if(entries.length<2){const d=el("div","");d.style.cssText="text-align:center;color:#6b6b85;padding:24px 0;font-size:13px;";d.textContent="Log at least 2 weigh-ins to see your trend 📈";return d;}
  const W=300,H=110,PAD=14;
  const weights=entries.map(e=>e.weight);const minW=Math.min(...weights)-0.5,maxW=Math.max(...weights)+0.5;
  const xStep=(W-PAD*2)/Math.max(entries.length-1,1);
  const yScale=w=>PAD+((maxW-w)/(maxW-minW))*(H-PAD*2);
  const pts=entries.map((e,i)=>({x:PAD+i*xStep,y:yScale(e.weight)}));
  const poly=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const n=pts.length;
  const sX=pts.reduce((s,_,i)=>s+i,0),sY=pts.reduce((s,p)=>s+p.y,0);
  const sXY=pts.reduce((s,p,i)=>s+i*p.y,0),sX2=pts.reduce((s,_,i)=>s+i*i,0);
  const den=n*sX2-sX*sX,slope=den?(n*sXY-sX*sY)/den:0,intercept=(sY-slope*sX)/n;
  const td=slope<0,gid=`wg${color.replace("#","")}`;
  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");svg.setAttribute("viewBox",`0 0 ${W} ${H}`);svg.style.width="100%";svg.style.overflow="visible";
  const defs=document.createElementNS(NS,"defs");const lg=document.createElementNS(NS,"linearGradient");lg.id=gid;lg.setAttribute("x1","0");lg.setAttribute("y1","0");lg.setAttribute("x2","0");lg.setAttribute("y2","1");
  const s1=document.createElementNS(NS,"stop");s1.setAttribute("offset","0%");s1.setAttribute("stop-color",color);s1.setAttribute("stop-opacity","0.25");
  const s2=document.createElementNS(NS,"stop");s2.setAttribute("offset","100%");s2.setAttribute("stop-color",color);s2.setAttribute("stop-opacity","0");
  lg.appendChild(s1);lg.appendChild(s2);defs.appendChild(lg);svg.appendChild(defs);
  const pg=document.createElementNS(NS,"polygon");pg.setAttribute("points",`${pts[0].x},${H} ${poly} ${pts[pts.length-1].x},${H}`);pg.setAttribute("fill",`url(#${gid})`);svg.appendChild(pg);
  const pl=document.createElementNS(NS,"polyline");pl.setAttribute("points",poly);pl.setAttribute("fill","none");pl.setAttribute("stroke",color);pl.setAttribute("stroke-width","2.5");pl.setAttribute("stroke-linejoin","round");pl.setAttribute("stroke-linecap","round");svg.appendChild(pl);
  const tl=document.createElementNS(NS,"line");tl.setAttribute("x1",PAD);tl.setAttribute("y1",intercept);tl.setAttribute("x2",PAD+(n-1)*xStep);tl.setAttribute("y2",slope*(n-1)+intercept);tl.setAttribute("stroke",td?"#00E676":"#FF5252");tl.setAttribute("stroke-width","1.5");tl.setAttribute("stroke-dasharray","4 3");tl.setAttribute("opacity","0.7");svg.appendChild(tl);
  pts.forEach(p=>{const c=document.createElementNS(NS,"circle");c.setAttribute("cx",p.x);c.setAttribute("cy",p.y);c.setAttribute("r","3.5");c.setAttribute("fill",color);svg.appendChild(c);});
  const wrap=el("div","");wrap.appendChild(svg);
  const lr=el("div","");lr.style.cssText="display:flex;justify-content:space-between;font-size:10px;color:#6b6b85;margin-top:2px;";
  lr.innerHTML=`<span>${entries[0].date.slice(5)}</span><span style="font-size:11px;color:${td?"#00E676":"#FF5252"}">${td?"▼ Trending down ✓":"▲ Trending up"}</span><span>${entries[entries.length-1].date.slice(5)}</span>`;
  wrap.appendChild(lr);return wrap;
}

    const fields=[["Habit Name","name","text",existing?.name||""],["Icon (emoji)","icon","text",existing?.icon||"⭐"],["Target (days/month)","target","number",existing?.target||30]];
    const inputs={};
    fields.forEach(([lbl,key,type,val])=>{const f=el("div","modal-field");f.innerHTML=`<label>${lbl}</label>`;const inp=el("input","field");inp.type=type;inp.value=val;inputs[key]=inp;f.appendChild(inp);box.appendChild(f);});
    const row=el("div","modal-row");row.style.marginTop="8px";
    const cancel=el("button","btn-outline");cancel.style.flex="1";cancel.textContent="Cancel";cancel.onclick=closeModal;
    const sv=el("button","btn");sv.style.flex="2";sv.textContent=existing?"Save Changes":"Add Habit";
    sv.onclick=()=>{const name=inputs.name.value.trim();if(!name)return;if(existing){S.habits=S.habits.map(h=>h.id===existing.id?{...h,name,icon:inputs.icon.value,target:Number(inputs.target.value)}:h);}else{S.habits.push({id:`h${Date.now()}`,name,icon:inputs.icon.value,target:Number(inputs.target.value)});}save();closeModal();render();};
    row.appendChild(cancel);row.appendChild(sv);box.appendChild(row);
  });
}

function showGoalModal(usr){
  showModal(`Add Goal for ${S.users[usr].name}`,box=>{
    const nf=el("div","modal-field");nf.innerHTML="<label>Goal Name</label>";const ni=el("input","field");ni.placeholder="e.g. Running 5K 🏃";nf.appendChild(ni);box.appendChild(nf);
    const df=el("div","modal-field");df.innerHTML="<label>Target Date</label>";const di=el("input","field");di.type="date";df.appendChild(di);box.appendChild(df);
    const row=el("div","modal-row");row.style.marginTop="8px";
    const cancel=el("button","btn-outline");cancel.style.flex="1";cancel.textContent="Cancel";cancel.onclick=closeModal;
    const sv=el("button","btn");sv.style.background=S.users[usr].color;sv.style.flex="2";sv.textContent="Add Goal";
    sv.onclick=()=>{if(!ni.value.trim()||!di.value)return;if(!S.goals)S.goals={me:[],partner:[]};if(!S.goals[usr])S.goals[usr]=[];S.goals[usr].push({id:`g${Date.now()}`,name:ni.value.trim(),date:di.value});save();closeModal();render();};
    row.appendChild(cancel);row.appendChild(sv);box.appendChild(row);
  });
}

function showPrizeModal(winner){
  showModal(`🏆 Set Prize for ${S.users[winner].name}`,box=>{
    const f=el("div","modal-field");f.innerHTML="<label>What's the prize?</label>";const inp=el("input","field");inp.placeholder="e.g. Dinner at favorite restaurant 🍣";f.appendChild(inp);box.appendChild(f);
    const row=el("div","modal-row");row.style.marginTop="8px";
    const cancel=el("button","btn-outline");cancel.style.flex="1";cancel.textContent="Cancel";cancel.onclick=closeModal;
    const sv=el("button","btn btn-gold");sv.style.flex="2";sv.textContent="Set Prize 🎁";
    sv.onclick=()=>{if(!inp.value.trim())return;if(!S.prizes)S.prizes={};S.prizes[`${winner}|${monthKey(curYear,curMonth)}`]=inp.value.trim();save();closeModal();render();};
    row.appendChild(cancel);row.appendChild(sv);box.appendChild(row);setTimeout(()=>inp.focus(),100);
  });
}

function showEditUserModal(usr){
  showModal(`Edit ${S.users[usr].name}`,box=>{
    const nf=el("div","modal-field");nf.innerHTML="<label>Name</label>";const ni=el("input","field");ni.value=S.users[usr].name;nf.appendChild(ni);box.appendChild(nf);
    const ef=el("div","modal-field");ef.innerHTML="<label>Emoji</label>";const ei=el("input","field");ei.value=S.users[usr].emoji;ef.appendChild(ei);box.appendChild(ef);
    const sv=el("button","btn btn-full");sv.style.marginTop="8px";sv.textContent="Save";
    sv.onclick=()=>{S.users[usr].name=ni.value||S.users[usr].name;S.users[usr].emoji=ei.value||S.users[usr].emoji;save();closeModal();render();};
    box.appendChild(sv);
  });
}
</script>
